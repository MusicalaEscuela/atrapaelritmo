<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atrapa el Ritmo · Musicala</title>
  <meta name="description" content="Mini juego arcade educativo de Musicala para practicar pulso, coordinación y precisión rítmica." />
  <meta name="theme-color" content="#f7f4ff" />
  <meta name="color-scheme" content="light only" />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" aria-label="Atrapa el Ritmo Musicala">
    <section id="game-root" class="game-root" aria-label="Juego"></section>

    <section id="hud" class="hud hud--hidden" aria-label="Estado de partida">
      <div class="hud__metric"><span>Puntos</span><strong data-hud="score">0</strong></div>
      <div class="hud__metric hud__metric--combo"><span>Combo</span><strong data-hud="combo">x0</strong></div>
      <div class="hud__metric"><span>Precisión</span><strong data-hud="accuracy">100%</strong></div>
      <div class="hud__metric"><span>Fallos</span><strong data-hud="misses">0</strong></div>
    </section>

    <section id="touch-controls" class="touch-controls" aria-label="Controles táctiles">
      <button type="button" data-lane="0">A</button>
      <button type="button" data-lane="1">S</button>
      <button type="button" data-lane="2">D</button>
      <button type="button" data-lane="3">F</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
